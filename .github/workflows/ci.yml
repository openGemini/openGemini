name: Continuous Integration

on:
  workflow_dispatch:
  pull_request:
    types: [ opened, synchronize, reopened, ready_for_review ]
    paths-ignore:
      - 'config/**'
      - 'docker/**'
      - 'docs/**'
      - 'images/**'
      - 'scripts/**'
      - 'tests/**'
      - '**.md'
      - '.gitignore'

env:
  GO111MODULE: on
  GONOSUMDB: "*"
  GOSUMDB: off
  TZ: Asia/Shanghai

jobs:
  CommitLint:
    name: commit lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100
      - name: Run commitlint
        uses: wagoid/commitlint-github-action@v5
      - name: Run license check
        run: make license-check
  GoLint:
    name: "static check, style check, go vet and other go lint"
    needs: CommitLint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
      - name: Run static check
        run: make static-check
      - name: Run go version check
        run: make go-version-check
      - name: Run go generate check
        run: make go-generate
      - name: Run style check
        run: make style-check
      - name: Run go vet check
        run: make go-vet-check
#      - name: Run golangci-lint  ## TODO: use github-action below
#        run: make golangci-lint-check

  UT:
    name: unit test
    needs: [GoLint]
    strategy:
      fail-fast: true
      matrix:
        os: ["ubuntu-latest"] # "macOS-latest"
        go: ["1.24"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - name: Run gotest
        env:
          CI: "true"
          GOTEST_TIMEOUT: 15m
        run: |
          go mod tidy
          make gotest
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  IntegrationTest:
    name: integration test
    needs: [GoLint]
    strategy:
      fail-fast: true
      matrix:
        os: ["ubuntu-latest"] # "macOS-latest"
        go: ["1.24"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - name: Run build and serve
        run: |
          make build-check
          make go-build
          make start-subscriber
          bash scripts/install_cluster.sh
          ps -ef | grep ts- | grep -v grep
      - name: Run integration test
        env:
          CI: "true"
        run: |
          make integration-test
      - name: Cleanup integration test env
        if: always()
        env:
          CI: "true"
        run: |
          make stop-subscriber || true
          make clean-test-env || true
